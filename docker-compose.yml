version: '3.8'

services:
  # 1. PostgreSQL 数据库
  postgres:
    image: postgres:18-alpine
    container_name: journal_postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PWD} 
      POSTGRES_DB: ${PG_DB}
    ports:
      - "${PG_PORT}:5432"
    volumes:
      - ./.space/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: journal_redis
    environment:
      - REDIS_PASSWORD=${REDIS_PWD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./.space/redis:/data
    restart: unless-stopped

  # 3. Elasticsearch 搜索
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: journal_es
    environment:
      - ELASTIC_PASSWORD=${ES_PWD}
      - discovery.type=single-node
      - xpack.security.enabled=false # 方便开发，暂时关闭 https/密码认证
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT}:9200"
    volumes:
      - ./.space/elasticsearch:/usr/share/elasticsearch/data
      # 挂载插件目录以便后续安装 IK 分词器
      - ./.space/es_plugins:/usr/share/elasticsearch/plugins 
    restart: unless-stopped

  # 4. Kafka (KRaft 模式，抛弃臃肿的 Zookeeper)
  kafka:
    image: bitnami/kafka:3.5
    container_name: journal_kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
    ports:
      - "${KAFKA_PORT}:9092"
    volumes:
      - ./.space/kafka:/bitnami/kafka
    restart: unless-stopped