# Alembic 数据库迁移配置文件
# 项目: 期刊平台后端
# 数据库: PostgreSQL (异步 asyncpg 驱动)

[alembic]
# 迁移脚本目录路径
script_location = alembic

# 模板文件路径
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时间戳时区设置
timezone = Asia/Shanghai

# 是否使用事务性 DDL (PostgreSQL 支持)
transactional_ddl = true

# 输出编码
output_encoding = utf-8

# 迁移版本表名
version_table = alembic_version

# 版本表结构
version_table_pk = true

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# 注意: sqlalchemy.url 不在此处配置
# 数据库连接字符串在 alembic/env.py 中动态获取
