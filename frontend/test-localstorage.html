<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 LocalStorage 数据</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }
        h2 {
            color: #3498db;
            margin: 1.5rem 0 1rem;
        }
        .button {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 1rem;
            margin-bottom: 1rem;
        }
        .button:hover {
            background: #2980b9;
        }
        .button.danger {
            background: #e74c3c;
        }
        .button.danger:hover {
            background: #c0392b;
        }
        .button.success {
            background: #2ecc71;
        }
        .button.success:hover {
            background: #27ae60;
        }
        .data-section {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            border-left: 4px solid #3498db;
        }
        .data-item {
            margin-bottom: 1rem;
        }
        .data-label {
            font-weight: 600;
            color: #2c3e50;
        }
        .data-value {
            background: #e9ecef;
            padding: 1rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            margin: 0.5rem 0;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .no-data {
            color: #e74c3c;
            font-style: italic;
        }
        .data-count {
            color: #2ecc71;
            font-weight: 600;
        }
        .code {
            background: #e9ecef;
            padding: 1rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            margin: 1rem 0;
            overflow-x: auto;
        }
        .instructions {
            background: #fff3cd;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #ffeeba;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <h1>测试 LocalStorage 数据</h1>
    
    <h2>操作按钮</h2>
    <button class="button" onclick="showAllData()">查看所有数据</button>
    <button class="button" onclick="showJournalsData()">查看期刊数据</button>
    <button class="button" onclick="fixJournalsData()">修复期刊数据</button>
    <button class="button danger" onclick="clearAllData()">清除所有数据</button>
    <button class="button success" onclick="generateTestJournals()">生成测试期刊</button>
    
    <h2>数据显示</h2>
    <div id="dataDisplay" class="data-section">
        <p>点击按钮查看或操作数据</p>
    </div>
    
    <h2>使用说明</h2>
    <div class="instructions">
        <h3>如果期刊目录仍为空，可能的原因：</h3>
        <ol>
            <li>LocalStorage中没有期刊数据</li>
            <li>期刊数据格式不正确</li>
            <li>期刊状态不符合条件（只有"已通过"和"已发表"的期刊才会显示在目录中）</li>
        </ol>
        
        <h3>解决方案：</h3>
        <ol>
            <li>点击"生成测试期刊"按钮，生成10篇测试期刊</li>
            <li>点击"修复期刊数据"按钮，确保期刊状态正确</li>
            <li>刷新前端应用页面，查看期刊目录</li>
        </ol>
    </div>

    <script>
        // 显示所有数据
        function showAllData() {
            const dataDisplay = document.getElementById('dataDisplay');
            let html = '<h3>所有 LocalStorage 数据</h3>';
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                html += `
                    <div class="data-item">
                        <div class="data-label">${key}:</div>
                        <div class="data-value">${value}</div>
                    </div>
                `;
            }
            
            if (localStorage.length === 0) {
                html += '<p class="no-data">LocalStorage 中没有数据</p>';
            }
            
            dataDisplay.innerHTML = html;
        }
        
        // 显示期刊数据
        function showJournalsData() {
            const dataDisplay = document.getElementById('dataDisplay');
            const journalsJson = localStorage.getItem('journals');
            
            if (!journalsJson) {
                dataDisplay.innerHTML = '<h3>期刊数据</h3><p class="no-data">没有找到期刊数据</p>';
                return;
            }
            
            try {
                const journals = JSON.parse(journalsJson);
                html = `
                    <h3>期刊数据</h3>
                    <p>共有 <span class="data-count">${journals.length}</span> 篇期刊</p>
                `;
                
                // 统计各状态的期刊数量
                const statusCount = {};
                journals.forEach(journal => {
                    statusCount[journal.status] = (statusCount[journal.status] || 0) + 1;
                });
                
                html += '<h4>状态统计：</h4>';
                for (const [status, count] of Object.entries(statusCount)) {
                    html += `<p>${status}: <span class="data-count">${count}</span> 篇</p>`;
                }
                
                html += '<h4>期刊列表：</h4>';
                journals.forEach((journal, index) => {
                    html += `
                        <div class="data-item">
                            <div class="data-label">期刊 ${index + 1} (${journal.id}):</div>
                            <div class="data-value">
                                标题: ${journal.title}\n
                                作者: ${journal.author}\n
                                状态: ${journal.status}\n
                                日期: ${journal.date}\n
                                模块: ${journal.module}
                            </div>
                        </div>
                    `;
                });
                
                dataDisplay.innerHTML = html;
            } catch (error) {
                dataDisplay.innerHTML = `
                    <h3>期刊数据</h3>
                    <p class="no-data">期刊数据格式不正确：${error.message}</p>
                    <div class="data-value">${journalsJson}</div>
                `;
            }
        }
        
        // 修复期刊数据
        function fixJournalsData() {
            const dataDisplay = document.getElementById('dataDisplay');
            const journalsJson = localStorage.getItem('journals');
            
            if (!journalsJson) {
                dataDisplay.innerHTML = '<h3>修复期刊数据</h3><p class="no-data">没有找到期刊数据</p>';
                return;
            }
            
            try {
                let journals = JSON.parse(journalsJson);
                
                // 修复状态
                const validStatuses = ['已通过', '已发表', '审稿中', '未通过'];
                journals = journals.map(journal => {
                    // 确保状态有效
                    if (!validStatuses.includes(journal.status)) {
                        journal.status = '已通过'; // 默认设置为已通过
                    }
                    return journal;
                });
                
                // 保存修复后的数据
                localStorage.setItem('journals', JSON.stringify(journals));
                
                // 统计已通过和已发表的数量
                const validJournals = journals.filter(journal => 
                    journal.status === '已通过' || journal.status === '已发表'
                );
                
                dataDisplay.innerHTML = `
                    <h3>修复期刊数据</h3>
                    <p>修复完成！共有 <span class="data-count">${journals.length}</span> 篇期刊，其中 <span class="data-count">${validJournals.length}</span> 篇符合显示条件（已通过或已发表）</p>
                    <p>现在可以刷新前端应用页面查看期刊目录</p>
                `;
            } catch (error) {
                dataDisplay.innerHTML = `
                    <h3>修复期刊数据</h3>
                    <p class="no-data">修复失败：${error.message}</p>
                `;
            }
        }
        
        // 清除所有数据
        function clearAllData() {
            if (confirm('确定要清除所有 LocalStorage 数据吗？')) {
                localStorage.clear();
                const dataDisplay = document.getElementById('dataDisplay');
                dataDisplay.innerHTML = '<h3>清除数据</h3><p class="no-data">所有数据已清除</p>';
            }
        }
        
        // 生成测试期刊
        function generateTestJournals() {
            const testJournals = [];
            const modules = ['医学影像', '药物研发', '临床研究', '公共卫生', '生物信息学', '人工智能', '其他'];
            const authors = ['张三', '李四', '王五', '赵六', '孙七', '周八', '吴九', '郑十'];
            const keywordsList = [
                ['深度学习', '医学图像', '人工智能'],
                ['药物研发', '临床试验', '新药'],
                ['临床研究', '循证医学', '医学统计'],
                ['公共卫生', '流行病学', '健康管理'],
                ['生物信息学', '基因组学', '蛋白质组学'],
                ['人工智能', '机器学习', '大数据'],
                ['其他', '医学教育', '医院管理']
            ];
            
            // 生成10篇测试期刊，确保一半以上是已通过或已发表状态
            for (let i = 1; i <= 10; i++) {
                const status = i <= 7 ? (i % 2 === 0 ? '已通过' : '已发表') : (i % 3 === 0 ? '审稿中' : '未通过');
                const moduleIndex = Math.floor(Math.random() * modules.length);
                
                const journal = {
                    id: 1000 + i,
                    title: `测试期刊 ${i}：${modules[moduleIndex]} 领域的研究`,
                    author: authors[Math.floor(Math.random() * authors.length)],
                    date: new Date().toISOString().split('T')[0],
                    status: status,
                    reviewStage: status === '已通过' || status === '已发表' ? '终审' : '初审',
                    abstract: `这是测试期刊 ${i} 的摘要内容，介绍了 ${modules[moduleIndex]} 领域的研究背景、方法、结果和结论。`,
                    keywords: keywordsList[moduleIndex],
                    module: modules[moduleIndex],
                    content: `<h3>摘要</h3><p>这是测试期刊 ${i} 的摘要内容。</p><h3>引言</h3><p>研究背景和意义...</p>`,
                    viewCount: Math.floor(Math.random() * 1000)
                };
                
                testJournals.push(journal);
            }
            
            // 保存到localStorage
            const existingJournals = JSON.parse(localStorage.getItem('journals') || '[]');
            const allJournals = [...existingJournals, ...testJournals];
            localStorage.setItem('journals', JSON.stringify(allJournals));
            
            const dataDisplay = document.getElementById('dataDisplay');
            dataDisplay.innerHTML = `
                <h3>生成测试期刊</h3>
                <p>成功生成 <span class="data-count">10</span> 篇测试期刊！</p>
                <p>其中 <span class="data-count">7</span> 篇是已通过或已发表状态</p>
                <p>现在可以刷新前端应用页面查看期刊目录</p>
            `;
        }
    </script>
</body>
</html>
