<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除本地存储</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>清除本地存储</h1>
        <p>点击下方按钮清除浏览器本地存储，然后自动跳转到登录页面。</p>
        <button onclick="clearStorage()">清除本地存储并跳转</button>
    </div>

    <script>
        function clearStorage() {
            // 清除所有本地存储数据
            localStorage.clear();
            console.log('本地存储已清除');
            
            // 跳转到登录页面
            window.location.href = '/login';
        }
        
        // 自动清除并跳转
        window.onload = function() {
            clearStorage();
        };
    </script>
</body>
</html>
